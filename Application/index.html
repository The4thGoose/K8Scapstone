<html>

<head>
    <title>Upload</title>
</head>

<body>
    <h2>Anonymous Upload</h2>
    <p>Upload a file. Download by opening the returned URL.</p>

    <form id="f">
        <input id="file" type="file" name="file" required>
        <button type="submit">Upload</button>
    </form>

    <p id="msg"></p>
    <p id="out" style="display:none">Link: <a id="link" href="#"></a></p>

    <script>
        const form = document.getElementById('f');
        const file = document.getElementById('file');
        const msg = document.getElementById('msg');
        const out = document.getElementById('out');
        const link = document.getElementById('link');

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            msg.textContent = '';
            out.style.display = 'none';

            if (!file.files.length) {
                msg.textContent = 'Pick a file first';
                return;
            }

            const data = new FormData();
            data.append('file', file.files[0]);

            try {
                const res = await fetch('/upload', { method: 'POST', body: data });
                const body = await res.json();
                if (!res.ok) {
                    msg.textContent = body.error || 'Upload failed';
                    return;
                }
                link.textContent = body.url;
                link.href = body.url;
                out.style.display = 'block';
            } catch (err) {
                msg.textContent = 'Upload failed';
            }
        });
    </script>
</body>

</html>
