apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: filestore
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/The4thGoose/K8Scapstone
    targetRevision: main
    path: Application/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: filestore
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
