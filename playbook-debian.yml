    - name: Wait for Argo CD application controller to be ready
      command: kubectl -n argocd rollout status statefulset/argocd-application-controller --timeout=300s
      become_user: administrator
      environment:
        KUBECONFIG: /home/administrator/.kube/config
      changed_when: false

    - name: wait 30s
      pause:
        seconds: 30

    - name: Deploy filestore Argo CD application
      shell: |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: filestore
          namespace: argocd
        spec:
          project: default
          source:
            repoURL: https://github.com/The4thGoose/K8Scapstone
            targetRevision: main
            path: Application/k8s
            kustomize:
              images:
                - kpwenzel/filestore-app=kpwenzel/filestore-app:latest
          destination:
            server: https://kubernetes.default.svc
            namespace: filestore
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
            syncOptions:
              - CreateNamespace=true
        EOF
      args:
        executable: /bin/bash
      become_user: administrator
      environment:
        KUBECONFIG: /home/administrator/.kube/config
      register: filestore_app_apply
      changed_when: "'created' in filestore_app_apply.stdout or 'configured' in filestore_app_apply.stdout"

    - name: Wait for filestore app to become synced and healthy
      command: kubectl -n argocd get application filestore -o jsonpath='{.status.sync.status} {.status.health.status}'
      become_user: administrator
      environment:
        KUBECONFIG: /home/administrator/.kube/config
      register: filestore_app_status
      until: "'Synced Healthy' in filestore_app_status.stdout"
      retries: 60
      delay: 10
      changed_when: false

    - name: Get kubeadm join command for workers
      command: kubeadm token create --print-join-command
      register: kube_join_cmd_raw
      changed_when: false

    - name: Save join command as host fact
      set_fact:
        kube_join_command: "{{ kube_join_cmd_raw.stdout }}"

